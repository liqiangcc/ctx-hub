name: CI

on:
  push:
    branches:
      - main
      - 'research/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-features

      - name: Test
        run: cargo test --all-features

      - name: Build release
        run: cargo build --release --all-features

      - name: Format check
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Clippy
        continue-on-error: true
        run: cargo clippy --all-targets --all-features -- -D warnings
